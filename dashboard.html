<!DOCTYPE html>
<html lang="en" class="h-full" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal — Koç JMUN</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    html,body{height:100%;margin:0;font-family:'Outfit',sans-serif}
    [data-theme="dark"] body{background:#0a0e1a;color:#fff}
    [data-theme="dark"] .surface{background:rgba(255,255,255,0.04);backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,0.08)}
    [data-theme="dark"] .surface-strong{background:rgba(255,255,255,0.07);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.12)}
    [data-theme="dark"] .glow-border{box-shadow:0 0 20px rgba(93,23,95,0.25),inset 0 0 20px rgba(93,23,95,0.1);border:1px solid rgba(93,23,95,0.4)}
    [data-theme="dark"] .bg-grid{background-image:linear-gradient(rgba(93,23,95,0.05) 1px,transparent 1px),linear-gradient(90deg,rgba(93,23,95,0.05) 1px,transparent 1px);background-size:60px 60px}
    [data-theme="dark"] .input-field{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#e2e8f0}
    [data-theme="dark"] .input-field::placeholder{color:#4b5563}
    [data-theme="dark"] .muted{color:#9ca3af}
    [data-theme="dark"] .label-text{color:#6b7280}
    [data-theme="dark"] .stat-card{background:rgba(255,255,255,0.05)}
    [data-theme="dark"] .item-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.06)}
    [data-theme="dark"] .subbox{background:rgba(0,0,0,0.25)}
    [data-theme="light"] body{background:#f5f3f7;color:#1a1523}
    [data-theme="light"] .surface{background:rgba(255,255,255,0.7);backdrop-filter:blur(16px);border:1px solid rgba(93,23,95,0.1)}
    [data-theme="light"] .surface-strong{background:#ffffff;border:1px solid rgba(93,23,95,0.12);box-shadow:0 4px 20px rgba(93,23,95,0.06)}
    [data-theme="light"] .glow-border{box-shadow:0 4px 24px rgba(93,23,95,0.1);border:1px solid rgba(93,23,95,0.2)}
    [data-theme="light"] .bg-grid{background-image:linear-gradient(rgba(93,23,95,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(93,23,95,0.03) 1px,transparent 1px);background-size:60px 60px}
    [data-theme="light"] .input-field{background:#ffffff;border:1px solid rgba(93,23,95,0.2);color:#1a1523}
    [data-theme="light"] .input-field::placeholder{color:#9ca3af}
    [data-theme="light"] .muted{color:#6b7280}
    [data-theme="light"] .label-text{color:#9ca3af}
    [data-theme="light"] .stat-card{background:#faf9fb;border:1px solid rgba(93,23,95,0.08)}
    [data-theme="light"] .item-card{background:#faf9fb;border:1px solid rgba(93,23,95,0.1)}
    [data-theme="light"] .subbox{background:#f1eef5}
    .input-field{transition:border-color .2s,box-shadow .2s}
    .input-field:focus{outline:none;border-color:rgba(93,23,95,0.7);box-shadow:0 0 0 3px rgba(93,23,95,0.15)}
    @keyframes pulse-glow{0%,100%{opacity:.4}50%{opacity:.8}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
    @keyframes spin{to{transform:rotate(360deg)}}
    .animate-pulse-glow{animation:pulse-glow 3s ease-in-out infinite}
    .animate-fadein{animation:fadeIn 0.4s ease-out forwards}
    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block}
    .skeleton{background:linear-gradient(90deg,rgba(128,128,128,0.1) 25%,rgba(128,128,128,0.2) 50%,rgba(128,128,128,0.1) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:6px}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:50;display:flex;align-items:center;justify-content:center;padding:1rem}
    .tab-btn{color:#9ca3af;border-bottom:2px solid transparent;transition:all .3s;padding-bottom:8px}
    .tab-btn.active{color:#a855f7;border-bottom-color:#5D175F}
    [data-theme="light"] .tab-btn{color:#6b7280}
    [data-theme="light"] .tab-btn.active{color:#5D175F}
    .status-pending{background:rgba(234,179,8,0.15);color:#a16207;border:1px solid rgba(234,179,8,0.3)}
    .status-received{background:rgba(59,130,246,0.15);color:#1d4ed8;border:1px solid rgba(59,130,246,0.3)}
    .status-under_review{background:rgba(99,102,241,0.15);color:#4338ca;border:1px solid rgba(99,102,241,0.3)}
    .status-sent_to_panel{background:rgba(124,58,237,0.15);color:#6d28d9;border:1px solid rgba(124,58,237,0.3)}
    .status-published{background:rgba(34,197,94,0.15);color:#15803d;border:1px solid rgba(34,197,94,0.3)}
    .status-withdrawn{background:rgba(107,114,128,0.15);color:#6b7280;border:1px solid rgba(107,114,128,0.3)}
    .status-approved{background:rgba(34,197,94,0.15);color:#15803d;border:1px solid rgba(34,197,94,0.3)}
    .status-rejected{background:rgba(239,68,68,0.15);color:#b91c1c;border:1px solid rgba(239,68,68,0.3)}
    [data-theme="dark"] .status-pending{color:#fde047}
    [data-theme="dark"] .status-received{color:#93c5fd}
    [data-theme="dark"] .status-under_review{color:#a5b4fc}
    [data-theme="dark"] .status-sent_to_panel{color:#c4b5fd}
    [data-theme="dark"] .status-published{color:#86efac}
    [data-theme="dark"] .status-withdrawn{color:#9ca3af}
    [data-theme="dark"] .status-approved{color:#86efac}
    [data-theme="dark"] .status-rejected{color:#fca5a5}
  </style>
</head>
<body class="h-full overflow-auto bg-grid">
  <div class="fixed inset-0 pointer-events-none overflow-hidden" style="z-index:0">
    <div class="absolute top-[10%] left-[15%] w-96 h-96 rounded-full bg-purple-900/10 blur-3xl animate-pulse-glow"></div>
    <div class="absolute bottom-[20%] right-[10%] w-80 h-80 rounded-full bg-purple-800/8 blur-3xl animate-pulse-glow" style="animation-delay:1.5s"></div>
  </div>

  <div class="relative z-10 w-full">
    <nav class="w-full px-4 sm:px-8 py-4">
      <div class="max-w-7xl mx-auto flex items-center justify-between">
        <div class="flex items-center gap-2">
          <img src="https://i.ibb.co/pBH9L8Sk/jmun26logoblack-e.png" alt="Koç JMUN Logo" style="height:50px;width:auto">
        </div>
        <div class="flex items-center gap-3">
          <button onclick="toggleTheme()" class="p-2 rounded-lg surface hover:opacity-80 transition" title="Toggle theme">
            <i data-lucide="sun" style="width:18px;height:18px" id="theme-icon"></i>
          </button>
          <button onclick="handleSignOut()" class="px-4 py-2 rounded-lg text-purple-200 font-medium hover:bg-purple-500/10 transition text-sm" style="border:1px solid rgba(93,23,95,0.4)">Sign Out</button>
        </div>
      </div>
    </nav>

    <section class="max-w-7xl mx-auto px-4 sm:px-8 pt-8 pb-16 animate-fadein">
      <div class="surface-strong rounded-2xl p-5 sm:p-8 glow-border">
        <div class="flex items-center justify-between mb-6 pb-4 border-b" style="border-color:rgba(128,128,128,0.1)">
          <div>
            <p class="text-xs label-text">Delegate Portal</p>
            <h3 class="text-lg font-semibold">Welcome, <span class="text-purple-400" id="delegate-name"><span class="skeleton inline-block w-28 h-5 align-middle"></span></span> 👋</h3>
          </div>
          <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div><span class="text-xs text-green-400">Live</span>
          </div>
        </div>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5">
          <div class="stat-card rounded-xl p-3"><p class="text-[10px] label-text uppercase tracking-wider mb-1">Committee</p><p class="font-semibold text-sm text-purple-400" id="committee-text"><span class="skeleton block h-4 w-16"></span></p></div>
          <div class="stat-card rounded-xl p-3"><p class="text-[10px] label-text uppercase tracking-wider mb-1">Country</p><p class="font-semibold text-sm text-purple-400" id="country-text"><span class="skeleton block h-4 w-20"></span></p></div>
          <div class="stat-card rounded-xl p-3"><p class="text-[10px] label-text uppercase tracking-wider mb-1">Room</p><p class="font-semibold text-sm text-purple-400" id="room-text"><span class="skeleton block h-4 w-12"></span></p></div>
          <div class="stat-card rounded-xl p-3"><p class="text-[10px] label-text uppercase tracking-wider mb-1">Next Session</p><p class="font-semibold text-sm text-purple-400" id="session-time-text"><span class="skeleton block h-4 w-14"></span></p></div>
        </div>
        <div id="urgent-banner" class="hidden bg-purple-500/10 border border-purple-500/20 rounded-xl p-4 flex items-start gap-3">
          <i data-lucide="alert-circle" style="width:18px;height:18px" class="text-purple-400 flex-shrink-0 mt-0.5"></i>
          <div><p class="text-xs font-medium text-purple-400 mb-0.5" id="urgent-title">Urgent</p><p class="text-xs muted" id="urgent-text"></p></div>
        </div>
        <div class="mt-4 surface rounded-xl p-4" id="next-session-block" style="display:none">
          <p class="text-xs label-text mb-2">Upcoming</p>
          <div class="flex items-center justify-between">
            <div><p class="text-sm font-medium" id="session-title-text">—</p><p class="text-xs muted"><span id="session-time-range">—</span> • <span id="session-room">—</span></p></div>
            <span id="session-countdown" class="text-[10px] px-2 py-1 rounded-full bg-purple-500/10 text-purple-400 border border-purple-500/20"></span>
          </div>
        </div>
      </div>

      <div class="flex gap-6 border-b mt-8 mb-6 overflow-x-auto" style="border-color:rgba(128,128,128,0.1)">
        <button class="tab-btn active text-sm font-medium whitespace-nowrap" onclick="switchTab('resolutions')" id="tab-resolutions">Resolutions</button>
        <button class="tab-btn text-sm font-medium whitespace-nowrap" onclick="switchTab('amendments')" id="tab-amendments">My Amendments</button>
        <button class="tab-btn text-sm font-medium whitespace-nowrap" onclick="switchTab('announcements')" id="tab-announcements">Announcements</button>
        <button class="tab-btn text-sm font-medium whitespace-nowrap" onclick="switchTab('feed')" id="tab-feed">Committee Feed</button>
      </div>

      <div id="tab-actions" class="mb-4">
        <button onclick="openSubmitModal()" id="submit-res-btn" class="flex items-center gap-2 px-3 py-2 rounded-lg text-xs font-medium text-white transition" style="background:#5D175F">
          <i data-lucide="plus" style="width:14px;height:14px"></i> Submit Resolution
        </button>
      </div>

      <div class="surface-strong rounded-2xl p-5 sm:p-6 glow-border mb-8">
        <div id="content-list" class="space-y-3">
          <div class="item-card rounded-xl p-4"><div class="skeleton h-4 w-24 mb-2"></div><div class="skeleton h-3 w-64"></div></div>
          <div class="item-card rounded-xl p-4"><div class="skeleton h-4 w-24 mb-2"></div><div class="skeleton h-3 w-56"></div></div>
        </div>
      </div>

      <footer class="border-t pt-8" style="border-color:rgba(128,128,128,0.1)">
        <div class="flex flex-col sm:flex-row items-center justify-between gap-4 text-xs muted">
          <div class="text-center sm:text-left"><p class="font-medium">Portal — Koç JMUN</p><p>For registered participants only.</p></div>
          <div class="flex gap-4"><a href="#" class="hover:opacity-70 transition">Main Website</a><a href="#" class="hover:opacity-70 transition">Contact</a></div>
        </div>
      </footer>
    </section>
  </div>

  <!-- Submit Resolution Modal -->
  <div id="submit-modal" class="modal-overlay hidden">
    <div class="surface-strong rounded-2xl p-6 w-full max-w-lg glow-border">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-semibold">Submit Resolution</h2>
        <button onclick="closeSubmitModal()" class="muted hover:opacity-70"><i data-lucide="x" style="width:20px;height:20px"></i></button>
      </div>
      <div class="space-y-4">
        <div><label class="block text-xs font-medium label-text mb-1.5 uppercase tracking-wider">Agenda Item</label>
          <select id="res-agenda" class="input-field w-full px-4 py-3 rounded-xl text-sm">
            <option value="Agenda Item 1">Agenda Item 1</option>
            <option value="Agenda Item 2">Agenda Item 2</option>
            <option value="Agenda Item 3">Agenda Item 3</option>
          </select></div>
        <div><label class="block text-xs font-medium label-text mb-1.5 uppercase tracking-wider">Google Docs Link</label>
          <input id="res-doc-url" type="url" placeholder="https://docs.google.com/document/d/..." class="input-field w-full px-4 py-3 rounded-xl text-sm font-mono">
          <p class="text-[10px] muted mt-1.5">Set sharing to "Anyone with the link can view". Your chair assigns the official code.</p></div>
        <div><label class="block text-xs font-medium label-text mb-1.5 uppercase tracking-wider">Short Explanation</label>
          <textarea id="res-summary" rows="3" placeholder="In a sentence or two, what does your resolution propose?" class="input-field w-full px-4 py-3 rounded-xl text-sm resize-none"></textarea></div>
        <div id="submit-error" class="hidden text-xs text-red-400 bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2"></div>
        <div class="flex gap-3 pt-2">
          <button onclick="closeSubmitModal()" class="flex-1 py-3 rounded-xl text-sm font-medium muted hover:opacity-80 transition surface">Cancel</button>
          <button onclick="submitResolution()" id="submit-btn" class="flex-1 py-3 rounded-xl text-sm font-semibold text-white transition flex items-center justify-center gap-2" style="background:#5D175F">
            <span id="submit-btn-text">Submit</span><span id="submit-spinner" class="hidden"><span class="spinner"></span></span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://guekhtmrtohkrsgfwjnj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1ZWtodG1ydG9oa3JzZ2Z3am5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MTA2ODIsImV4cCI6MjA5NzA4NjY4Mn0.itQUPtckChXJApE6993hTgROdK_RkuQD7tsvp3M5R_I';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const BUILD = '2026-06-16.2';
    console.log('%cKoç JMUN · dashboard.html · build '+BUILD,'color:#5D175F;font-weight:700;font-size:13px');
    document.addEventListener('DOMContentLoaded',function(){var b=document.createElement('div');b.textContent='build '+BUILD;b.style.cssText='position:fixed;bottom:5px;right:7px;font:600 9px/1 Outfit,sans-serif;letter-spacing:.04em;opacity:.30;color:#5D175F;pointer-events:none;z-index:9999';document.body.appendChild(b);});

    let currentProfile = null;
    let currentTab = 'resolutions';
    let cachedAnnouncements = [];
    let cachedResolutions = [];

    function toggleTheme() {
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      try { localStorage.setItem('jmun_theme', next); } catch(e){}
      document.getElementById('theme-icon').setAttribute('data-lucide', next === 'dark' ? 'sun' : 'moon');
      lucide.createIcons();
    }
    (function(){ let s='dark'; try{s=localStorage.getItem('jmun_theme')||'dark';}catch(e){} document.documentElement.setAttribute('data-theme',s); })();
    lucide.createIcons();
    document.getElementById('theme-icon').setAttribute('data-lucide', document.documentElement.getAttribute('data-theme')==='dark'?'sun':'moon');
    lucide.createIcons();

    async function init() {
      const { data: { session } } = await sb.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }
      const { data: roleCheck } = await sb.from('profiles').select('role').eq('id', session.user.id).single();
      if (roleCheck && roleCheck.role === 'chair') { window.location.href = 'chair.html'; return; }
      if (roleCheck && roleCheck.role === 'exec')  { window.location.href = 'exec.html'; return; }
      await loadDashboard(session.user.id);
    }

    async function handleSignOut() { await sb.auth.signOut(); window.location.href = 'login.html'; }

    async function loadDashboard(userId) {
      try {
        const { data: delegate, error: delegateErr } = await sb.from('profiles').select('*').eq('id', userId).single();
        if (delegateErr || !delegate) { console.error('Could not load profile:', delegateErr); return; }
        currentProfile = delegate;
        document.getElementById('delegate-name').textContent = delegate.name;
        document.getElementById('committee-text').textContent = delegate.committee;
        document.getElementById('country-text').textContent = (delegate.country + ' ' + (delegate.country_flag||'')).trim();
        document.getElementById('room-text').textContent = delegate.room || '—';

        const [sessionsRes, announcementsRes] = await Promise.all([
          sb.from('sessions').select('*').eq('committee', delegate.committee).gt('starts_at', new Date().toISOString()).order('starts_at',{ascending:true}).limit(1),
          sb.from('announcements').select('*').or('committee.is.null,committee.eq.'+delegate.committee).order('created_at',{ascending:false}).limit(20)
        ]);

        cachedAnnouncements = announcementsRes.data || [];
        renderNextSession(sessionsRes.data && sessionsRes.data[0] || null, delegate.room);
        showUrgentBanner(cachedAnnouncements);
        renderTab('resolutions');
        lucide.createIcons();
      } catch (err) { console.error('Dashboard load error:', err); }
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.getElementById('tab-'+tab).classList.add('active');
      document.getElementById('tab-actions').style.display = tab === 'resolutions' ? 'block' : 'none';
      renderTab(tab);
      lucide.createIcons();
    }

    function renderTab(tab) {
      if (tab === 'resolutions') renderResolutions();
      else if (tab === 'amendments') renderMyAmendments();
      else if (tab === 'announcements') renderAnnouncements();
      else if (tab === 'feed') renderFeed();
    }

    async function renderResolutions() {
      const c = document.getElementById('content-list');
      c.innerHTML = '<div class="item-card rounded-xl p-4"><div class="skeleton h-4 w-24 mb-2"></div><div class="skeleton h-3 w-64"></div></div>';
      const { data: all } = await sb.from('resolutions').select('*')
        .eq('committee', currentProfile.committee).order('created_at',{ascending:true});
      cachedResolutions = all || [];
      // Show published committee resolutions + my own submissions (any status)
      const items = cachedResolutions.filter(r => r.status==='published' || r.submitted_by===currentProfile.id);
      if (!items.length) { c.innerHTML = emptyState('file-text','No resolutions yet','Published resolutions for '+currentProfile.committee+' appear here.'); return; }
      const statusLabel = {pending:'Submitted — with your chair',under_review:'Under review by chairboard',sent_to_panel:'Sent to approval panel',published:'Projected on all panels',withdrawn:'Withdrawn'};
      c.innerHTML = items.map(r => {
        const isMine = r.submitted_by===currentProfile.id;
        const heading = r.title || r.summary || 'Resolution';
        return '<div class="item-card rounded-xl p-4 hover:opacity-95 transition">'+
          '<div class="flex items-start justify-between gap-4">'+
            '<div class="min-w-0">'+
              '<div class="flex items-center gap-2 mb-1 flex-wrap">'+
                (r.code ? '<p class="text-sm font-semibold text-purple-400">'+escHtml(r.code)+'</p>' : '')+
                (r.agenda_item ? '<span class="text-[10px] px-2 py-0.5 rounded-full" style="background:rgba(128,128,128,0.1)">'+escHtml(r.agenda_item)+'</span>' : '')+
                '<span class="text-[10px] px-2 py-0.5 rounded-full status-'+r.status+'">'+statusLabel[r.status]+'</span>'+
                (isMine ? '<span class="text-[10px] px-2 py-0.5 rounded-full" style="background:rgba(93,23,95,0.15);color:#a855f7">Yours</span>' : '')+
              '</div>'+
              '<p class="text-xs muted">'+escHtml(heading)+'</p>'+
            '</div>'+
            '<div class="flex gap-2 flex-shrink-0 flex-wrap justify-end">'+
              ((r.exec_doc_url||r.chair_doc_url) ? '<a href="'+escHtml(r.exec_doc_url||r.chair_doc_url)+'" target="_blank" class="px-3 py-1.5 text-xs font-medium rounded-lg text-white transition" style="background:#5D175F">Google Docs</a>' : '')+
              (r.status==='published' ? '<a href="amend.html?resolution='+r.id+'" class="px-3 py-1.5 text-xs font-medium rounded-lg bg-amber-500/15 text-amber-500 hover:bg-amber-500/25 transition border border-amber-500/30">Amend</a>' : '')+
              (isMine ? '<button onclick="deleteResolution(\''+r.id+'\')" class="px-3 py-1.5 text-xs font-medium rounded-lg bg-red-500/10 text-red-400 hover:bg-red-500/20 transition border border-red-500/20">Delete</button>' : '')+
            '</div>'+
          '</div></div>';
      }).join('');
      lucide.createIcons();
    }

    async function renderMyAmendments() {
      const c = document.getElementById('content-list');
      c.innerHTML = '<div class="item-card rounded-xl p-4"><div class="skeleton h-4 w-24 mb-2"></div><div class="skeleton h-3 w-64"></div></div>';
      // need resolution titles for context
      if (!cachedResolutions.length) {
        const { data: rs } = await sb.from('resolutions').select('id,code,title,summary').eq('committee', currentProfile.committee);
        cachedResolutions = rs || [];
      }
      const resMap = {}; cachedResolutions.forEach(r => resMap[r.id] = r);
      const { data: all } = await sb.from('amendments').select('*').eq('committee', currentProfile.committee).order('created_at',{ascending:false});
      const mine = (all||[]).filter(a => a.submitted_by===currentProfile.id);
      if (!mine.length) { c.innerHTML = emptyState('git-pull-request','No amendments yet','Open a resolution and hit "Amend" to propose a change. Their status will show here.'); return; }
      const typeLabels = {insert:'Insert',add:'Add',strike:'Strike Out',change:'Change'};
      const typeColors = {insert:'#a855f7',add:'#22c55e',strike:'#ef4444',change:'#3b82f6'};
      c.innerHTML = mine.map(a => {
        const res = resMap[a.resolution_id];
        const resLabel = res ? ((res.code? res.code+' — ':'')+(res.title||res.summary||'Resolution')) : 'Resolution';
        const statusLabel = {pending:'Pending review',approved:'Approved',rejected:'Rejected'}[a.status];
        const row = (label,val) => '<div><p class="text-[10px] label-text uppercase tracking-wider mb-0.5">'+label+'</p><p class="text-sm">'+val+'</p></div>';
        return '<div class="item-card rounded-xl p-5 space-y-3">'+
          '<div class="flex items-center justify-between gap-3 flex-wrap">'+
            '<div class="flex items-center gap-2 flex-wrap">'+
              '<span class="text-[11px] px-2.5 py-1 rounded-full font-semibold" style="background:'+typeColors[a.amendment_type]+'22;color:'+typeColors[a.amendment_type]+'">'+typeLabels[a.amendment_type]+'</span>'+
              '<span class="text-[11px] px-2.5 py-1 rounded-full status-'+a.status+'">'+statusLabel+'</span>'+
            '</div>'+
            (a.status==='pending' ? '<button onclick="deleteAmendment(\''+a.id+'\')" class="muted hover:text-red-400 transition flex items-center gap-1 text-[11px]"><i data-lucide="trash-2" style="width:13px;height:13px"></i> Delete</button>' : '')+
          '</div>'+
          row('On Resolution', escHtml(resLabel))+
          row('Part / Clause', escHtml(a.target_clause||'—'))+
          '<div><p class="text-[10px] label-text uppercase tracking-wider mb-1">Your amendment</p><p class="text-sm leading-relaxed subbox rounded-lg p-3">'+escHtml(a.amendment_text)+'</p></div>'+
          (a.status==='rejected'&&a.review_note ? '<div><p class="text-[10px] label-text uppercase tracking-wider mb-1">Chair\'s reason</p><p class="text-sm subbox rounded-lg p-3 text-red-400">'+escHtml(a.review_note)+'</p></div>' : '')+
          (a.status==='approved' ? '<p class="text-xs text-green-400">✓ Your chair approved this amendment.</p>' : '')+
          '<p class="text-[10px] muted">Submitted '+timeAgo(a.created_at)+'</p>'+
        '</div>';
      }).join('');
      lucide.createIcons();
    }

    async function deleteAmendment(id) {
      if(!confirm('Delete this amendment? You can only do this while it is still pending.')) return;
      const { error } = await sb.from('amendments').delete().eq('id', id);
      if(error){ console.error(error); alert('Could not delete — it may have already been reviewed.'); }
      renderMyAmendments();
    }

    function renderAnnouncements() {
      const c = document.getElementById('content-list');
      if (!cachedAnnouncements.length) { c.innerHTML = emptyState('megaphone','No announcements','Announcements from the exec team appear here.'); return; }
      const colors = {info:'#a855f7',urgent:'#ef4444',warning:'#f97316',success:'#22c55e'};
      const labels = {info:'Information',urgent:'Urgent',warning:'Notice',success:'Confirmed'};
      c.innerHTML = cachedAnnouncements.map(a =>
        '<div class="item-card rounded-xl p-4 border-l-4" style="border-left-color:'+(colors[a.type]||'#a855f7')+'">'+
          '<div class="flex items-center gap-2 mb-1">'+
            '<span class="text-xs font-medium uppercase" style="color:'+(colors[a.type]||'#a855f7')+'">'+(labels[a.type]||a.type)+'</span>'+
            (a.committee ? '' : '<span class="text-[10px] px-2 py-0.5 rounded" style="background:rgba(128,128,128,0.1)">All</span>')+
          '</div>'+
          '<p class="text-sm font-semibold mb-0.5">'+escHtml(a.title)+'</p>'+
          '<p class="text-xs muted">'+escHtml(a.body)+'</p>'+
          '<p class="text-[10px] muted mt-1">'+timeAgo(a.created_at)+'</p>'+
        '</div>').join('');
    }

    async function renderFeed() {
      const c = document.getElementById('content-list');
      c.innerHTML = '<div class="item-card rounded-xl p-4"><div class="skeleton h-4 w-24 mb-2"></div><div class="skeleton h-3 w-64"></div></div>';
      const { data: feed } = await sb.from('committee_feed').select('*').eq('committee', currentProfile.committee).order('created_at',{ascending:false}).limit(30);
      if (!feed || !feed.length) { c.innerHTML = emptyState('rss','No activity yet','Committee updates from your chair appear here.'); return; }
      c.innerHTML = feed.map(f => {
        const author = ((f.posted_by_role||'').charAt(0).toUpperCase()+(f.posted_by_role||'').slice(1)+' '+(f.posted_by_name||'')).trim();
        return '<div class="item-card rounded-xl p-4 border-l-4" style="border-left-color:#5D175F">'+
          '<p class="text-sm font-semibold mb-0.5">'+escHtml(f.title)+'</p>'+
          '<p class="text-xs muted mb-2">'+escHtml(f.body)+'</p>'+
          '<p class="text-[10px] muted">Posted by '+escHtml(author||'Chair')+' · '+timeAgo(f.created_at)+'</p>'+
        '</div>';
      }).join('');
      lucide.createIcons();
    }

    function renderNextSession(session, room) {
      const t = document.getElementById('session-time-text');
      if (!session) { t.textContent = 'No upcoming'; return; }
      const startsAt = new Date(session.starts_at);
      const diffMins = Math.round((startsAt - new Date())/60000);
      t.textContent = startsAt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      document.getElementById('next-session-block').style.display='block';
      document.getElementById('session-title-text').textContent = session.title;
      document.getElementById('session-time-range').textContent = session.time_range;
      document.getElementById('session-room').textContent = 'Room ' + (session.room||room);
      const cd = document.getElementById('session-countdown');
      if (diffMins<0) cd.textContent='In progress';
      else if (diffMins<60) cd.textContent='In '+diffMins+' min';
      else cd.textContent='In '+Math.floor(diffMins/60)+'h';
    }

    function showUrgentBanner(items) {
      const urgent = items.find(a=>a.type==='urgent');
      if (urgent) {
        document.getElementById('urgent-banner').classList.remove('hidden');
        document.getElementById('urgent-title').textContent = urgent.title;
        document.getElementById('urgent-text').textContent = urgent.body;
      }
    }

    function openSubmitModal(){ document.getElementById('submit-modal').classList.remove('hidden'); }
    function closeSubmitModal(){ document.getElementById('submit-modal').classList.add('hidden'); }
    async function submitResolution() {
      const agenda=document.getElementById('res-agenda').value;
      const docUrl=document.getElementById('res-doc-url').value.trim();
      const summary=document.getElementById('res-summary').value.trim();
      const errEl=document.getElementById('submit-error');
      errEl.classList.add('hidden');
      if(!docUrl||!summary){ errEl.textContent='Please add the Google Docs link and a short explanation.'; errEl.classList.remove('hidden'); return; }
      if(!docUrl.includes('docs.google.com')){ errEl.textContent='Please enter a valid Google Docs link.'; errEl.classList.remove('hidden'); return; }
      document.getElementById('submit-btn').disabled=true;
      document.getElementById('submit-btn-text').textContent='Submitting…';
      document.getElementById('submit-spinner').classList.remove('hidden');
      const { error } = await sb.from('resolutions').insert({
        agenda_item: agenda, committee: currentProfile.committee,
        submitted_by: currentProfile.id, submitter_role: 'delegate', submitter_country: currentProfile.country,
        chair_doc_url: docUrl, summary, status: 'pending'
      });
      document.getElementById('submit-btn').disabled=false;
      document.getElementById('submit-btn-text').textContent='Submit';
      document.getElementById('submit-spinner').classList.add('hidden');
      if(error){ console.error(error); errEl.textContent='Submission failed.'; errEl.classList.remove('hidden'); return; }
      closeSubmitModal();
      document.getElementById('res-doc-url').value=''; document.getElementById('res-summary').value='';
      if(currentTab==='resolutions') renderResolutions();
      alert('Resolution submitted to your chair. You can follow its progress here.');
    }

    async function deleteResolution(id) {
      if(!confirm('Delete this resolution? This removes it for everyone.')) return;
      const { error } = await sb.from('resolutions').delete().eq('id', id);
      if(error){ console.error(error); alert('Could not delete (you can only delete resolutions you submitted).'); return; }
      renderResolutions();
    }

    function emptyState(icon,title,sub){ return '<div class="text-center py-12 muted"><i data-lucide="'+icon+'" style="width:32px;height:32px;margin:0 auto 8px;display:block;opacity:0.3"></i><p class="text-sm">'+title+'</p><p class="text-xs mt-1">'+sub+'</p></div>'; }
    function escHtml(s){ if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function escAttr(s){ if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/'/g,'\\\'').replace(/"/g,'&quot;'); }
    function timeAgo(iso){
      if(!iso) return '';
      let s = String(iso).trim();
      if(!/[zZ]$|[+\-]\d\d:?\d\d$/.test(s)){ s = s.replace(' ','T') + 'Z'; }
      const then = new Date(s).getTime();
      if(isNaN(then)) return '';
      const d = Math.round((Date.now()-then)/60000);
      if(d<1) return 'just now';
      if(d<60) return d+'m ago';
      if(d<1440) return Math.floor(d/60)+'h ago';
      return Math.floor(d/1440)+'d ago';
    }

    sb.channel('delegate-updates')
      .on('postgres_changes',{event:'*',schema:'public',table:'resolutions'},()=>{ if(currentTab==='resolutions')renderResolutions(); })
      .on('postgres_changes',{event:'*',schema:'public',table:'amendments'},()=>{ if(currentTab==='amendments')renderMyAmendments(); })
      .on('postgres_changes',{event:'*',schema:'public',table:'committee_feed'},()=>{ if(currentTab==='feed')renderFeed(); })
      .on('postgres_changes',{event:'*',schema:'public',table:'announcements'},()=>{ if(currentProfile) loadDashboard(currentProfile.id); })
      .subscribe();

    init();
  </script>
</body>
</html>
