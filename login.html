<!DOCTYPE html>
<html lang="en" class="h-full" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Koç JMUN</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    html, body { height: 100%; margin: 0; font-family: 'Outfit', sans-serif; }
    .glass {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .glass-strong {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .glow-border {
      box-shadow: 0 0 20px rgba(93,23,95,0.25), inset 0 0 20px rgba(93,23,95,0.1);
      border: 1px solid rgba(93,23,95,0.4);
    }
    .glow-btn {
      box-shadow: 0 0 24px rgba(93,23,95,0.4), 0 0 48px rgba(93,23,95,0.15);
    }
    .bg-grid {
      background-image:
        linear-gradient(rgba(93,23,95,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(93,23,95,0.05) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
    @keyframes pulse-glow { 0%,100%{opacity:0.4} 50%{opacity:0.8} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    .animate-pulse-glow { animation: pulse-glow 3s ease-in-out infinite; }
    .animate-fadein { animation: fadeIn 0.5s ease-out forwards; }
    .input-field {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #e2e8f0;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-field:focus {
      outline: none;
      border-color: rgba(93,23,95,0.7);
      box-shadow: 0 0 0 3px rgba(93,23,95,0.15);
    }
    .input-field::placeholder { color: #4b5563; }
    .btn-primary {
      background: #5D175F;
      transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
    }
    .btn-primary:hover:not(:disabled) {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 0 28px rgba(93,23,95,0.5);
    }
    .btn-primary:active:not(:disabled) { transform: translateY(0); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-box {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.25);
      color: #fca5a5;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Theme system (matches dashboards) ─── */
    [data-theme="dark"]  body { background:#0a0e1a; color:#fff; }
    [data-theme="light"] body { background:#f5f3f7; color:#1a1523; }

    [data-theme="dark"]  .glass-strong { background:rgba(255,255,255,0.07); backdrop-filter:blur(24px); border:1px solid rgba(255,255,255,0.12); }
    [data-theme="light"] .glass-strong { background:#ffffff; border:1px solid rgba(93,23,95,0.12); box-shadow:0 8px 30px rgba(93,23,95,0.08); backdrop-filter:none; }

    [data-theme="dark"]  .glow-border { box-shadow:0 0 20px rgba(93,23,95,0.25), inset 0 0 20px rgba(93,23,95,0.1); border:1px solid rgba(93,23,95,0.4); }
    [data-theme="light"] .glow-border { box-shadow:0 8px 30px rgba(93,23,95,0.1); border:1px solid rgba(93,23,95,0.2); }

    [data-theme="dark"]  .input-field { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); color:#e2e8f0; }
    [data-theme="light"] .input-field { background:#ffffff; border:1px solid rgba(93,23,95,0.2); color:#1a1523; }
    [data-theme="dark"]  .input-field::placeholder { color:#4b5563; }
    [data-theme="light"] .input-field::placeholder { color:#9ca3af; }

    [data-theme="dark"]  .surface { background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); }
    [data-theme="light"] .surface { background:rgba(255,255,255,0.7); border:1px solid rgba(93,23,95,0.12); }

    [data-theme="light"] .bg-grid { background-image:linear-gradient(rgba(93,23,95,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(93,23,95,0.04) 1px,transparent 1px); }
    [data-theme="light"] .animate-pulse-glow { opacity:0.5; }

    [data-theme="light"] .error-box { background:rgba(239,68,68,0.08); border:1px solid rgba(239,68,68,0.25); color:#b91c1c; }

    /* light-theme overrides for Tailwind text utilities used in the markup */
    [data-theme="light"] .text-white   { color:#1a1523 !important; }
    [data-theme="light"] .text-gray-400 { color:#6b7280 !important; }
    [data-theme="light"] .text-gray-500 { color:#6b7280 !important; }
    [data-theme="light"] .text-gray-600 { color:#9ca3af !important; }

    /* logo: purple-tinted in dark, natural black in light */
    [data-theme="light"] #brand-logo { filter:none !important; }
  </style>
</head>
<body class="h-full overflow-hidden bg-grid flex items-center justify-center">

  <!-- Theme toggle (top-right, matches dashboards) -->
  <button onclick="toggleTheme()" id="theme-btn" class="fixed top-4 right-4 z-20 p-2.5 rounded-lg surface hover:opacity-80 transition" title="Toggle theme">
    <i data-lucide="sun" style="width:18px;height:18px" id="theme-icon"></i>
  </button>


  <!-- Ambient orbs -->
  <div class="fixed inset-0 pointer-events-none overflow-hidden" style="z-index:0">
    <div class="absolute top-[10%] left-[15%] w-96 h-96 rounded-full bg-purple-900/10 blur-3xl animate-pulse-glow"></div>
    <div class="absolute bottom-[20%] right-[10%] w-80 h-80 rounded-full bg-purple-800/8 blur-3xl animate-pulse-glow" style="animation-delay:1.5s"></div>
    <div class="absolute top-[50%] left-[60%] w-64 h-64 rounded-full bg-purple-700/6 blur-3xl animate-pulse-glow" style="animation-delay:3s"></div>
  </div>

  <div class="relative z-10 w-full max-w-md mx-auto px-4 animate-fadein">

    <!-- Logo + header -->
    <div class="text-center mb-8">
      <img id="brand-logo" src="https://i.ibb.co/pBH9L8Sk/jmun26logoblack-e.png" alt="Koç JMUN" class="h-12 w-auto mx-auto mb-5" style="filter: brightness(0) invert(1) sepia(1) saturate(2) hue-rotate(250deg) brightness(1.4);">
      <h1 class="text-2xl font-semibold text-white mb-1">Portal</h1>
      <p class="text-sm text-gray-500">Sign in to access your conference dashboard</p>
    </div>

    <!-- Card -->
    <div class="glass-strong rounded-2xl p-7 glow-border">

      <!-- Error message -->
      <div id="error-box" class="hidden error-box rounded-xl px-4 py-3 mb-5 flex items-center gap-2 text-sm">
        <i data-lucide="alert-circle" style="width:16px;height:16px;flex-shrink:0"></i>
        <span id="error-text">Invalid email or password.</span>
      </div>

      <!-- Form -->
      <div class="space-y-4">
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Email</label>
          <input
            id="email-input"
            type="email"
            placeholder="delegate@school.edu"
            class="input-field w-full px-4 py-3 rounded-xl text-sm font-mono"
            autocomplete="email"
          >
        </div>
        <div>
          <label class="block text-xs font-medium text-gray-400 mb-1.5 uppercase tracking-wider">Password</label>
          <div class="relative">
            <input
              id="password-input"
              type="password"
              placeholder="••••••••"
              class="input-field w-full px-4 py-3 rounded-xl text-sm font-mono pr-11"
              autocomplete="current-password"
            >
            <button
              type="button"
              id="toggle-password"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-300 transition"
              tabindex="-1"
            >
              <i data-lucide="eye" style="width:16px;height:16px" id="eye-icon"></i>
            </button>
          </div>
        </div>

        <button
          id="login-btn"
          class="btn-primary w-full py-3 rounded-xl text-sm font-semibold text-white mt-2 flex items-center justify-center gap-2"
          onclick="handleLogin()"
        >
          <span id="btn-text">Sign In</span>
          <span id="btn-spinner" class="hidden"><span class="spinner"></span></span>
        </button>
      </div>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-5">
        <div class="flex-1 h-px bg-white/5"></div>
        <span class="text-[10px] text-gray-600 uppercase tracking-wider">Secure Access</span>
        <div class="flex-1 h-px bg-white/5"></div>
      </div>

      <!-- Info note -->
      <div class="flex items-start gap-2.5 text-xs text-gray-500">
        <i data-lucide="shield" style="width:14px;height:14px;flex-shrink:0;margin-top:1px" class="text-purple-700"></i>
        <p>Your credentials were provided by the Koç JMUN Secretariat. Contact your committee director if you have trouble signing in.</p>
      </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-[11px] text-gray-600 mt-6">
      Koç JMUN · Portal · For registered participants only
    </p>
  </div>

  <script>
    // ─── Supabase init ───────────────────────────────────────────────
    const SUPABASE_URL = 'https://guekhtmrtohkrsgfwjnj.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1ZWtodG1ydG9oa3JzZ2Z3am5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1MTA2ODIsImV4cCI6MjA5NzA4NjY4Mn0.itQUPtckChXJApE6993hTgROdK_RkuQD7tsvp3M5R_I';
    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const BUILD = '2026-06-17';
    console.log('%cKoç JMUN · login.html · build '+BUILD,'color:#5D175F;font-weight:700;font-size:13px');
    document.addEventListener('DOMContentLoaded',function(){var b=document.createElement('div');b.textContent='build '+BUILD;b.style.cssText='position:fixed;bottom:5px;right:7px;font:600 9px/1 Outfit,sans-serif;letter-spacing:.04em;opacity:.30;color:#5D175F;pointer-events:none;z-index:9999';document.body.appendChild(b);});

    // ─── Theme (persisted, shared key with dashboards) ───────────────
    (function initTheme(){
      let saved = 'dark';
      try { saved = localStorage.getItem('jmun_theme') || 'dark'; } catch(e){}
      document.documentElement.setAttribute('data-theme', saved);
    })();
    function toggleTheme(){
      const html = document.documentElement;
      const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      html.setAttribute('data-theme', next);
      try { localStorage.setItem('jmun_theme', next); } catch(e){}
      document.getElementById('theme-icon').setAttribute('data-lucide', next === 'dark' ? 'sun' : 'moon');
      lucide.createIcons();
    }

    // ─── If already logged in, go straight to dashboard ─────────────
    (async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) window.location.href = 'dashboard.html';
    })();

    // ─── Icons ───────────────────────────────────────────────────────
    lucide.createIcons();
    document.getElementById('theme-icon').setAttribute('data-lucide', document.documentElement.getAttribute('data-theme') === 'dark' ? 'sun' : 'moon');
    lucide.createIcons();

    // ─── Password toggle ─────────────────────────────────────────────
    let passwordVisible = false;
    document.getElementById('toggle-password').addEventListener('click', () => {
      passwordVisible = !passwordVisible;
      const input = document.getElementById('password-input');
      input.type = passwordVisible ? 'text' : 'password';
      document.getElementById('eye-icon').setAttribute('data-lucide', passwordVisible ? 'eye-off' : 'eye');
      lucide.createIcons();
    });

    // ─── Enter key support ───────────────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });

    // ─── Login handler ───────────────────────────────────────────────
    async function handleLogin() {
      const email    = document.getElementById('email-input').value.trim();
      const password = document.getElementById('password-input').value;
      const btn      = document.getElementById('login-btn');
      const errBox   = document.getElementById('error-box');
      const errText  = document.getElementById('error-text');

      // Hide previous error
      errBox.classList.add('hidden');

      // Basic validation
      if (!email || !password) {
        showError('Please enter your email and password.');
        return;
      }

      // Loading state
      setLoading(true);

      try {
        const { data, error } = await sb.auth.signInWithPassword({ email, password });

        if (error) {
          showError(friendlyError(error.message));
          setLoading(false);
          return;
        }

        // Route to correct dashboard based on role
        const { data: profile } = await sb.from('profiles').select('role').eq('id', data.user.id).single();
        const role = profile?.role || 'delegate';
        if (role === 'exec') window.location.href = 'exec.html';
        else if (role === 'chair') window.location.href = 'chair.html';
        else window.location.href = 'dashboard.html';

      } catch (err) {
        showError('Something went wrong. Please try again.');
        setLoading(false);
      }
    }

    function setLoading(loading) {
      const btn     = document.getElementById('login-btn');
      const text    = document.getElementById('btn-text');
      const spinner = document.getElementById('btn-spinner');
      btn.disabled  = loading;
      text.textContent = loading ? 'Signing in…' : 'Sign In';
      spinner.classList.toggle('hidden', !loading);
    }

    function showError(msg) {
      document.getElementById('error-text').textContent = msg;
      document.getElementById('error-box').classList.remove('hidden');
    }

    function friendlyError(msg) {
      if (msg.includes('Invalid login')) return 'Incorrect email or password. Please try again.';
      if (msg.includes('Email not confirmed')) return 'Please confirm your email before signing in.';
      if (msg.includes('Too many requests')) return 'Too many attempts. Please wait a moment and try again.';
      return 'Sign in failed. Please check your credentials.';
    }
  </script>
</body>
</html>
